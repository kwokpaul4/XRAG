name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xrag
          POSTGRES_PASSWORD: xrag
          POSTGRES_DB: xrag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xrag -d xrag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      chromadb:
        image: chromadb/chroma:latest
        env:
          ALLOW_RESET: "true"
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v1/heartbeat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_URL: postgresql://xrag:xrag@localhost:5432/xrag
      CHROMA_URL: http://localhost:8000
      NODE_ENV: test
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run migrations
        run: npm run db:migrate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
