<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XRAG — Knowledge Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d12;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #252535;
      --border-light: #2e2e42;
      --accent: #7c6fef;
      --accent-hover: #6a5fdf;
      --accent-dim: #2d2860;
      --accent-glow: rgba(124,111,239,0.15);
      --text: #e8e8f0;
      --text-muted: #7a7a9a;
      --text-faint: #4a4a6a;
      --success: #34d399;
      --danger: #f87171;
      --radius: 14px;
      --radius-sm: 8px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --sidebar-width: 300px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 54px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em;
    }
    .logo-icon {
      width: 28px; height: 28px; background: var(--accent-dim);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .domain-label { font-size: 0.78rem; color: var(--text-muted); }
    #domain-select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm); padding: 6px 10px;
      font-size: 0.82rem; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    #domain-select:focus { border-color: var(--accent); }

    /* ── Layout ── */
    .container { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-title {
      padding: 16px 16px 12px;
      font-size: 0.7rem; font-weight: 700;
      color: var(--text-faint); text-transform: uppercase;
      letter-spacing: 0.12em;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Upload card ── */
    .upload-card {
      background: var(--surface2);
      border: 1.5px dashed var(--border-light);
      border-radius: var(--radius);
      padding: 20px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      text-align: center;
      position: relative;
    }
    .upload-card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    .upload-card.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
      box-shadow: 0 0 0 4px var(--accent-glow);
      transform: scale(1.01);
    }
    .upload-card input[type="file"] { display: none; }
    .upload-icon {
      width: 40px; height: 40px; margin: 0 auto 10px;
      background: var(--accent-dim); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: transform 0.2s;
    }
    .upload-card:hover .upload-icon, .upload-card.drag-over .upload-icon {
      transform: translateY(-2px);
    }
    .upload-title {
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      margin-bottom: 4px;
    }
    .upload-sub {
      font-size: 0.72rem; color: var(--text-muted);
      line-height: 1.5;
    }
    .upload-types {
      display: flex; justify-content: center; gap: 5px; margin-top: 10px; flex-wrap: wrap;
    }
    .upload-type-badge {
      font-size: 0.65rem; padding: 2px 7px;
      background: var(--bg); border: 1px solid var(--border-light);
      border-radius: 20px; color: var(--text-muted);
    }

    /* ── Upload progress ── */
    .upload-progress {
      display: none; margin-top: 8px;
      background: var(--bg); border-radius: 4px; overflow: hidden; height: 3px;
    }
    .upload-progress.active { display: block; }
    .upload-progress-bar {
      height: 100%; background: var(--accent);
      width: 0%; transition: width 0.3s;
      animation: progress-indeterminate 1.2s infinite ease-in-out;
    }
    @keyframes progress-indeterminate {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.7rem; color: var(--text-faint);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── URL input ── */
    .url-form {
      display: flex; flex-direction: column; gap: 6px;
    }
    .url-input-row { display: flex; gap: 6px; }
    .url-input-wrap { flex: 1; position: relative; }
    .url-input-wrap::before {
      content: '🔗';
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 0.75rem; pointer-events: none;
    }
    #url-input {
      width: 100%;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 8px 10px 8px 28px;
      font-size: 0.8rem; outline: none;
      transition: border-color 0.2s;
    }
    #url-input:focus { border-color: var(--accent); }
    #url-input::placeholder { color: var(--text-faint); }
    #url-btn {
      padding: 8px 14px; font-size: 0.78rem; font-weight: 600;
      border-radius: var(--radius-sm); white-space: nowrap; flex-shrink: 0;
    }

    /* ── Sources section ── */
    .sources-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .sources-label {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .sources-count {
      font-size: 0.68rem; background: var(--accent-dim); color: var(--accent);
      padding: 1px 7px; border-radius: 20px;
    }
    .source-list-inner { display: flex; flex-direction: column; gap: 4px; }
    .source-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .source-item:hover { border-color: var(--border-light); }
    .source-type-icon {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; flex-shrink: 0;
    }
    .source-type-icon.text { background: #1e3a2e; }
    .source-type-icon.pdf  { background: #3a1e1e; }
    .source-type-icon.excel{ background: #1e2e3a; }
    .source-type-icon.url  { background: #2e2a1e; }
    .source-info { flex: 1; min-width: 0; }
    .source-name {
      font-size: 0.78rem; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .source-meta { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }
    .source-del {
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-faint); cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, color 0.15s; font-size: 0.75rem;
    }
    .source-del:hover { background: rgba(248,113,113,0.15); color: var(--danger); }
    .no-sources {
      text-align: center; padding: 16px 8px;
      font-size: 0.78rem; color: var(--text-faint);
      border: 1px dashed var(--border); border-radius: var(--radius-sm);
    }

    /* ── Chat panel ── */
    .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages {
      flex: 1; overflow-y: auto; padding: 28px 24px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .message { max-width: 820px; width: 100%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .role-label {
      font-size: 0.7rem; color: var(--text-muted);
      margin-bottom: 5px; padding: 0 2px;
      display: flex; align-items: center; gap: 5px;
    }
    .role-avatar {
      width: 18px; height: 18px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700;
    }
    .role-avatar.user { background: var(--accent-dim); color: var(--accent); }
    .role-avatar.assistant { background: #1a2a1a; color: var(--success); }
    .user .role-label { flex-direction: row-reverse; }

    .bubble {
      padding: 13px 17px; border-radius: var(--radius);
      line-height: 1.7; font-size: 0.9rem;
      white-space: pre-wrap; word-break: break-word;
    }
    .user .bubble {
      background: var(--accent-dim);
      border: 1px solid rgba(124,111,239,0.3);
      border-bottom-right-radius: 4px;
    }
    .assistant .bubble {
      background: var(--surface2);
      border: 1px solid var(--border-light);
      border-bottom-left-radius: 4px;
    }
    .assistant .bubble.streaming::after {
      content: '▋'; color: var(--accent);
      animation: blink 0.7s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 20px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #chat-input {
      flex: 1; background: transparent; color: var(--text);
      border: none; font-family: var(--font); font-size: 0.9rem;
      resize: none; outline: none;
      max-height: 140px; min-height: 22px; line-height: 1.5;
    }
    #chat-input::placeholder { color: var(--text-faint); }
    #send-btn {
      width: 36px; height: 36px; padding: 0; flex-shrink: 0;
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--accent); }
    .input-hint {
      font-size: 0.68rem; color: var(--text-faint);
      margin-top: 6px; text-align: right;
    }

    /* ── Buttons ── */
    button {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.97); }
    button:disabled { background: var(--accent-dim); cursor: not-allowed; transform: none; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      color: #fff; padding: 10px 16px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 500;
      display: none; z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slide-up 0.25s ease;
    }
    @keyframes slide-up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    #toast.show { display: block; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); gap: 10px; padding: 40px;
    }
    .empty-icon { font-size: 2.5rem; opacity: 0.4; }
    .empty-state h2 { font-size: 1.3rem; color: var(--text); font-weight: 600; }
    .empty-state p { font-size: 0.85rem; max-width: 340px; text-align: center; line-height: 1.6; color: var(--text-muted); }
    .empty-tips {
      display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; justify-content: center;
    }
    .empty-tip {
      font-size: 0.75rem; padding: 5px 12px;
      background: var(--surface2); border: 1px solid var(--border-light);
      border-radius: 20px; color: var(--text-muted);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    XRAG
  </div>
  <div class="header-right">
    <span id="llm-badge" style="font-size:0.72rem;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border-light);padding:3px 9px;border-radius:20px;"></span>
    <span class="domain-label">Domain</span>
    <select id="domain-select"><option value="default">General AI</option></select>
  </div>
</header>

<div class="container">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-title">Knowledge Sources</div>
    <div class="sidebar-body">

      <!-- Upload card -->
      <label class="upload-card" id="upload-zone">
        <input type="file" id="file-input" accept=".txt,.pdf,.xlsx,.xls" multiple />
        <div class="upload-icon">📂</div>
        <div class="upload-title">Drop files here</div>
        <div class="upload-sub">or click to browse your computer</div>
        <div class="upload-types">
          <span class="upload-type-badge">PDF</span>
          <span class="upload-type-badge">TXT</span>
          <span class="upload-type-badge">XLSX</span>
        </div>
        <div class="upload-progress" id="upload-progress">
          <div class="upload-progress-bar"></div>
        </div>
      </label>

      <!-- Divider -->
      <div class="divider">or add a URL</div>

      <!-- URL form -->
      <div class="url-form">
        <div class="url-input-row">
          <div class="url-input-wrap">
            <input type="url" id="url-input" placeholder="https://example.com/article" />
          </div>
          <button id="url-btn" style="padding:8px 12px;font-size:0.78rem">Add</button>
        </div>
      </div>

      <!-- Source list -->
      <div>
        <div class="sources-header">
          <span class="sources-label">Ingested</span>
          <span class="sources-count" id="sources-count">0</span>
        </div>
        <div class="source-list-inner" id="source-list">
          <div class="no-sources">No sources yet</div>
        </div>
      </div>

    </div>
  </aside>

  <!-- ── Chat ── -->
  <main class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <h2>XRAG Knowledge Assistant</h2>
        <p>Upload documents or add a URL in the sidebar, then ask questions about your knowledge base.</p>
        <div class="empty-tips">
          <span class="empty-tip">📄 Upload PDF</span>
          <span class="empty-tip">📊 Upload Excel</span>
          <span class="empty-tip">🔗 Add URL</span>
          <span class="empty-tip">💬 Ask anything</span>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-row">
        <textarea id="chat-input" rows="1" placeholder="Ask a question about your knowledge base…"></textarea>
        <button id="send-btn" title="Send (Enter)">➤</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </main>

</div>

<div id="toast"></div>

<script>
(function () {
  const API = '';
  let sessionId = null;
  let isStreaming = false;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function typeIcon(type) {
    const map = { pdf: ['📄','pdf'], excel: ['📊','excel'], text: ['📝','text'], url: ['🔗','url'] };
    return map[type] || ['📎','text'];
  }

  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'success' ? '#059669' : type === 'info' ? '#4f46e5' : '#dc2626';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── Domains ───────────────────────────────────────────────────────────────
  async function loadDomains() {
    try {
      const res = await fetch(`${API}/api/domains`);
      const domains = await res.json();
      const sel = document.getElementById('domain-select');
      sel.innerHTML = domains.map(d =>
        `<option value="${escHtml(d.name)}">${escHtml(d.displayName)}</option>`
      ).join('');
    } catch { /* keep default */ }
  }

  // ── Sources ───────────────────────────────────────────────────────────────
  async function loadSources() {
    try {
      const res = await fetch(`${API}/api/sources`);
      const sources = await res.json();
      const list = document.getElementById('source-list');
      const count = document.getElementById('sources-count');
      count.textContent = sources.length;

      if (!sources.length) {
        list.innerHTML = '<div class="no-sources">No sources yet</div>';
        return;
      }

      list.innerHTML = sources.map(s => {
        const [icon, cls] = typeIcon(s.type);
        const date = new Date(s.created_at).toLocaleDateString();
        return `
          <div class="source-item">
            <div class="source-type-icon ${escHtml(cls)}">${icon}</div>
            <div class="source-info">
              <div class="source-name" title="${escHtml(s.name)}">${escHtml(s.name)}</div>
              <div class="source-meta">${escHtml(s.type)} · ${date}</div>
            </div>
            <div class="source-del" data-id="${escHtml(s.id)}" title="Remove source">✕</div>
          </div>`;
      }).join('');

      list.querySelectorAll('.source-del').forEach(el =>
        el.addEventListener('click', () => deleteSource(el.dataset.id))
      );
    } catch { showToast('Failed to load sources'); }
  }

  async function deleteSource(id) {
    await fetch(`${API}/api/sources/${id}`, { method: 'DELETE' });
    showToast('Source removed', 'info');
    loadSources();
  }

  // ── File upload ───────────────────────────────────────────────────────────
  const fileInput  = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');
  const uploadProg = document.getElementById('upload-progress');

  fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault(); uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', e => {
    if (!uploadZone.contains(e.relatedTarget)) uploadZone.classList.remove('drag-over');
  });
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    uploadFiles(e.dataTransfer.files);
  });

  async function uploadFiles(files) {
    if (!files.length) return;
    const domain = document.getElementById('domain-select').value;
    uploadProg.classList.add('active');

    for (const file of files) {
      const form = new FormData();
      form.append('file', file);
      form.append('domain', domain);
      try {
        const res = await fetch(`${API}/api/sources/upload`, { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast(`✓ ${file.name} — ${data.chunksIngested} chunks`, 'success');
      } catch (e) {
        showToast(`Failed: ${e.message}`);
      }
    }

    uploadProg.classList.remove('active');
    fileInput.value = '';
    loadSources();
  }

  // ── URL ingest ────────────────────────────────────────────────────────────
  const urlInput = document.getElementById('url-input');
  const urlBtn   = document.getElementById('url-btn');

  async function addUrl() {
    const url = urlInput.value.trim();
    if (!url) return;
    const domain = document.getElementById('domain-select').value;
    urlBtn.disabled = true;
    urlBtn.textContent = '…';
    try {
      const res = await fetch(`${API}/api/sources/url`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, domain }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      urlInput.value = '';
      showToast(`✓ URL ingested — ${data.chunksIngested} chunks`, 'success');
      loadSources();
    } catch (e) {
      showToast(`Failed: ${e.message}`);
    } finally {
      urlBtn.disabled = false;
      urlBtn.textContent = 'Add';
    }
  }

  urlBtn.addEventListener('click', addUrl);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addUrl(); });

  // ── Chat ──────────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const chatInput  = document.getElementById('chat-input');
  const sendBtn    = document.getElementById('send-btn');

  function appendMessage(role, text = '', streaming = false) {
    document.getElementById('empty-state')?.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    const avatarLabel = role === 'user' ? 'You' : 'AI';
    const avatarChar  = role === 'user' ? 'U' : '✦';
    wrap.innerHTML = `
      <div class="role-label">
        <span class="role-avatar ${role}">${avatarChar}</span>
        ${avatarLabel}
      </div>
      <div class="bubble${streaming ? ' streaming' : ''}">${escHtml(text)}</div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap.querySelector('.bubble');
  }

  async function sendMessage() {
    if (isStreaming) return;
    const msg = chatInput.value.trim();
    if (!msg) return;

    chatInput.value = '';
    chatInput.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    appendMessage('user', msg);
    const bubble = appendMessage('assistant', '', true);

    const domain = document.getElementById('domain-select').value;
    let buffer = '';

    try {
      const res = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, domain, sessionId }),
      });

      if (!res.ok) {
        const err = await res.json();
        bubble.textContent = `Error: ${err.error}`;
        bubble.classList.remove('streaming');
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value, { stream: true }).split('\n')) {
          if (!line.startsWith('data: ')) continue;
          try {
            const payload = JSON.parse(line.slice(6));
            if (payload.token) {
              buffer += payload.token;
              bubble.innerHTML = escHtml(buffer);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (payload.done) {
              sessionId = payload.sessionId;
              bubble.classList.remove('streaming');
            }
            if (payload.error) {
              bubble.textContent = `Error: ${payload.error}`;
              bubble.classList.remove('streaming');
            }
          } catch { /* partial line */ }
        }
      }
    } catch (e) {
      bubble.textContent = `Network error: ${e.message}`;
      bubble.classList.remove('streaming');
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  loadDomains();
  loadSources();
  chatInput.focus();

  // Show active LLM in header
  fetch('/health').then(r => r.json()).then(d => {
    const badge = document.getElementById('llm-badge');
    if (badge && d.llm) badge.textContent = '⚡ ' + d.llm;
  }).catch(() => {});
})();
</script>
</body>
</html>
